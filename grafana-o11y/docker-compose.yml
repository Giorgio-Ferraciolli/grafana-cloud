services:
  app:
    build:
      context: .
    image: grafana-o11y
    container_name: grafana-o11y
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: grafana-o11y
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.version=1.0.0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none # Desabilita a exportação de métricas, pois a licença gratuita do Grafana Cloud não suporta altos volumes de métricas, pode ativar se quiser
      OTEL_LOGS_EXPORTER: otlp
      OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: "true"
    depends_on:
      - postgres
      - otel-collector

  postgres:
    image: postgres:16
    container_name: grafana-o11y-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    env_file:
      - .env
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres_data: