{% load static %}

<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teste Django</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
        }
        .container {
            max-width: 720px;
            margin: 48px auto;
            padding: 32px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 { margin-top: 0; }
        .field { margin-bottom: 18px; }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cfd7df;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .errorlist {
            color: #b00020;
            margin: 6px 0;
            padding-left: 20px;
        }
        button {
            background: #2563eb;
            color: white;
            border: 0;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #1d4ed8; }
        .hint { color: #666; }
    </style>
</head>
<body>
    <main class="container">
        <h1>Formulário de Teste com Django</h1>
        <p class="hint">Preencha os campos abaixo para testar renderização de página, validação e envio via POST.</p>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="field">
                    {{ field.label_tag }}
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}
            <button type="submit">Enviar formulário</button>
        </form>
    </main>
</body>
</html>
